<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zenith · Network Logger</title>
<style>
:root{
  --bg:#0b0f14; --surface:#11171f; --surface-2:#161d27;
  --line:#1f2937; --line-soft:#1a2230;
  --text:#e6edf6; --text-2:#9aa7b8; --text-3:#5f6b7c;
  --accent:#2bd576; --accent-dim:#1c9a55; --accent-bg:rgba(43,213,118,.10);
  --block:#ff6b6b;
  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg); color:var(--text); min-height:100vh;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-font-smoothing:antialiased;
}
.tnum{font-variant-numeric:tabular-nums;}

/* header */
.hd{
  display:flex; align-items:center; gap:14px;
  padding:16px 28px; border-bottom:1px solid var(--line-soft);
  position:sticky; top:0; background:rgba(11,15,20,.92);
  backdrop-filter:blur(8px); z-index:20;
}
.hd-mark{color:var(--accent);}
.hd-title{font-size:16px;font-weight:700;letter-spacing:-0.3px;}
.hd-title span{color:var(--text-3);font-weight:500;}
.live{
  display:inline-flex; align-items:center; gap:7px; margin-left:4px;
  font-size:11px; font-weight:600; letter-spacing:.6px; color:var(--accent);
  text-transform:uppercase;
}
.live .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 0 3px var(--accent-bg); animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.hd-spacer{margin-left:auto; font-size:12px; color:var(--text-3);}

/* toolbar */
.toolbar{
  display:flex; gap:8px; align-items:center; flex-wrap:wrap;
  padding:14px 28px; border-bottom:1px solid var(--line-soft);
}
.search{
  flex:1; min-width:220px; font-family:var(--mono); font-size:12.5px;
  background:var(--surface); color:var(--text);
  border:1px solid var(--line); border-radius:8px; padding:9px 13px;
}
.search::placeholder{color:var(--text-3);}
.search:focus{outline:none;border-color:var(--accent-dim);}
.filters{display:flex;gap:5px;flex-wrap:wrap;}
.filter-btn{
  font-family:inherit; font-size:12px; font-weight:600; color:var(--text-2);
  background:var(--surface); border:1px solid var(--line-soft);
  border-radius:7px; padding:7px 13px; cursor:pointer; transition:all .15s ease;
}
.filter-btn:hover{border-color:var(--line);color:var(--text);}
.filter-btn.active{
  color:var(--accent); border-color:var(--accent-dim); background:var(--accent-bg);
}
.action-btn{
  font-family:inherit; font-size:12px; font-weight:600; color:var(--text-2);
  background:transparent; border:1px solid var(--line-soft);
  border-radius:7px; padding:7px 13px; cursor:pointer; transition:all .15s ease;
}
.action-btn:hover{color:var(--block);border-color:var(--block);}

/* stats */
.stats{
  display:flex; gap:28px; padding:11px 28px;
  border-bottom:1px solid var(--line-soft); font-size:12px; color:var(--text-2);
}
.stat b{color:var(--text);font-weight:600;font-variant-numeric:tabular-nums;margin-left:4px;}

/* table */
.log{padding:6px 16px 28px;}
.log-row{
  display:grid; grid-template-columns:74px 76px 1fr 150px 64px; gap:14px;
  padding:9px 12px; align-items:center; border-radius:7px;
  border-bottom:1px solid var(--line-soft);
}
.log-row:hover{background:var(--surface);}
.col-time{font-family:var(--mono);font-size:11.5px;color:var(--text-3);}
.col-type{
  font-family:var(--mono); font-size:10px; font-weight:600;
  text-transform:uppercase; letter-spacing:.4px;
  padding:3px 0; border-radius:5px; text-align:center;
}
.type-script{background:rgba(255,107,107,.14);color:#ff8585;}
.type-image{background:rgba(77,171,247,.14);color:#74bcff;}
.type-xmlhttprequest{background:rgba(255,180,84,.14);color:#ffc06b;}
.type-ping{background:rgba(255,215,64,.14);color:#ffe083;}
.type-sub_frame{background:rgba(177,136,255,.14);color:#c4a6ff;}
.type-main_frame{background:var(--accent-bg);color:var(--accent);}
.type-stylesheet{background:rgba(105,240,174,.14);color:#7ff0bb;}
.type-font{background:rgba(255,128,171,.14);color:#ff99bd;}
.type-media{background:rgba(132,255,255,.12);color:#9af;}
.type-other{background:var(--surface-2);color:var(--text-2);}
.type-cosmetic{background:rgba(206,147,216,.14);color:#dbaee2;}
.col-url{
  font-family:var(--mono); font-size:12px; color:var(--text-2);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.col-url .domain{color:var(--text);font-weight:500;}
.col-domain{font-family:var(--mono);font-size:11.5px;color:var(--text-3);text-align:right;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.col-action{text-align:center;}
.act-block{
  font-family:var(--mono); font-size:10px; font-weight:600; letter-spacing:.5px;
  color:var(--block); background:rgba(255,107,107,.10);
  border-radius:5px; padding:3px 0; display:block;
}

/* empty */
.empty{padding:90px 28px;text-align:center;}
.empty h2{font-size:15px;font-weight:600;color:var(--text-2);margin-bottom:8px;}
.empty p{font-size:13px;color:var(--text-3);max-width:380px;margin:0 auto;}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

<div class="hd">
  <svg class="hd-mark" width="22" height="22" viewBox="0 0 24 24" fill="none">
    <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" fill="currentColor"/>
    <path d="M10 15.5l-3.5-3.5 1.41-1.41L10 12.67l5.59-5.59L17 8.5l-7 7z" fill="#0b0f14"/>
  </svg>
  <div class="hd-title">Zenith <span>Network Logger</span></div>
  <span class="live"><span class="dot"></span>Live</span>
  <span class="hd-spacer">Refreshes every second</span>
</div>

<div class="toolbar">
  <input type="text" class="search" id="search" placeholder="Filter by URL or domain…" />
  <div class="filters">
    <button class="filter-btn active" data-type="all">All</button>
    <button class="filter-btn" data-type="script">Script</button>
    <button class="filter-btn" data-type="image">Image</button>
    <button class="filter-btn" data-type="xmlhttprequest">XHR</button>
    <button class="filter-btn" data-type="ping">Ping</button>
    <button class="filter-btn" data-type="sub_frame">Frame</button>
    <button class="filter-btn" data-type="cosmetic">Cosmetic</button>
  </div>
  <button class="action-btn" id="clear-btn">Clear log</button>
</div>

<div class="stats">
  <span class="stat">Total<b id="stat-total">0</b></span>
  <span class="stat">Showing<b id="stat-showing">0</b></span>
  <span class="stat">Domains<b id="stat-domains">0</b></span>
  <span class="stat">Updated<b id="stat-update">—</b></span>
</div>

<div class="log" id="log-container">
  <div class="empty">
    <h2>Waiting for blocked requests</h2>
    <p>Browse the web in another tab. Every ad and tracker Zenith blocks will appear here in real time.</p>
  </div>
</div>

<script src="network-logger.js"></script>
</body>
</html>
